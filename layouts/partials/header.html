<nav>
  <a href="/" class="nav-logo" aria-label="golf-lernen.at – Startseite">
    <svg height="32" viewBox="0 0 210 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="12" y1="4" x2="12" y2="35" stroke="#1A3C2E" stroke-width="2.2" stroke-linecap="square"/>
      <polygon points="12,4 12,22 36,13" fill="#5C8A3C"/>
      <line x1="5" y1="36" x2="19" y2="36" stroke="#1A3C2E" stroke-width="2.2" stroke-linecap="square"/>
      <text x="44" y="27" font-family="'DM Serif Display',Georgia,serif" font-size="22" fill="#1A3C2E" letter-spacing="-0.5">golf</text>
      <text x="86" y="27" font-family="'DM Serif Display',Georgia,serif" font-size="22" fill="#5C8A3C" letter-spacing="-0.5">-</text>
      <text x="96" y="27" font-family="'DM Serif Display',Georgia,serif" font-size="22" font-style="italic" fill="#1A3C2E" letter-spacing="-0.5">lernen</text>
      <text x="172" y="27" font-family="'DM Serif Display',Georgia,serif" font-size="22" fill="#5C8A3C">.</text>
      <text x="179" y="30" font-family="'DM Sans',system-ui,sans-serif" font-size="11" font-weight="600" fill="#5C8A3C" letter-spacing="0.06em">at</text>
      <line x1="44" y1="33" x2="200" y2="33" stroke="#5C8A3C" stroke-width="1.2" stroke-linecap="square"/>
    </svg>
  </a>

  <button class="nav-toggle" id="nav-toggle" aria-label="Menü öffnen" aria-expanded="false" aria-controls="nav-menu">
    <span class="nav-toggle-bar"></span>
    <span class="nav-toggle-bar"></span>
    <span class="nav-toggle-bar"></span>
  </button>

  <ul class="nav-links" id="nav-menu">
    {{ range .Site.Menus.main }}
    <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
    {{ end }}
  </ul>
</nav>

<script>
  (function () {
    var toggle = document.getElementById('nav-toggle');
    var menu = document.getElementById('nav-menu');
    if (!toggle || !menu) return;

    function closeMenu() {
      menu.classList.remove('open');
      toggle.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
      toggle.setAttribute('aria-label', 'Menü öffnen');
    }
    function openMenu() {
      menu.classList.add('open');
      toggle.classList.add('open');
      toggle.setAttribute('aria-expanded', 'true');
      toggle.setAttribute('aria-label', 'Menü schließen');
    }

    toggle.addEventListener('click', function () {
      menu.classList.contains('open') ? closeMenu() : openMenu();
    });

    // Schließen bei Klick auf einen Link
    menu.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', closeMenu);
    });

    // Schließen mit Escape
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeMenu();
    });

    // Schließen bei Klick außerhalb der Navigation
    document.addEventListener('click', function (e) {
      if (menu.classList.contains('open') && !e.target.closest('nav')) closeMenu();
    });
  })();
</script>
