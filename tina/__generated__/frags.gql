fragment GrundlagenParts on Grundlagen {
  __typename
  ... on GrundlagenArtikel {
    draft
    title
    description
    slug
    canonical
    robots
    hreflang
    image
    image_credit
    date
    lesezeit
    h1
    lead
    body
    tags
    kapitel
    weight
    stand
    json_ld
  }
  ... on GrundlagenUebersicht {
    draft
    title
    description
    slug
    canonical
    robots
    hreflang
    eyebrow
    h1
    lead
    kapitel_liste {
      __typename
      id
      label
      title
      desc
      nav_desc
    }
    json_ld
  }
}

